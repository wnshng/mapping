<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>네이버 로그인 콜백 처리 중</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family:
          "Pretendard Variable",
          Pretendard,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background:
          radial-gradient(circle at 10% -10%, #d4ffe8 0%, transparent 40%),
          radial-gradient(circle at 100% 0%, #dcebff 0%, transparent 35%),
          #f5f8fb;
        color: #1f2937;
      }

      .card {
        width: min(560px, calc(100vw - 24px));
        border: 1px solid #dbe4ef;
        border-radius: 16px;
        background: #fff;
        box-shadow: 0 14px 30px rgba(2, 6, 23, 0.08);
        padding: 18px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }

      p {
        margin: 0;
        font-size: 14px;
        color: #4b5563;
        line-height: 1.5;
      }

      .status {
        margin-top: 12px;
        border: 1px solid #dbe4ef;
        border-radius: 10px;
        background: #f8fbff;
        color: #1e3a8a;
        padding: 10px;
        font-size: 14px;
      }

      .error {
        border-color: #fecaca;
        background: #fef2f2;
        color: #991b1b;
      }

      .actions {
        margin-top: 12px;
        display: flex;
        gap: 8px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        border: 1px solid #dbe4ef;
        text-decoration: none;
        color: #1f2937;
        background: #fff;
        padding: 8px 12px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>네이버 로그인 처리 중</h1>
      <p>인증 결과를 저장하고 메인 화면으로 돌아갑니다.</p>
      <div id="status" class="status">토큰 정보를 확인하고 있습니다...</div>
      <div class="actions">
        <a id="backLink" href="./">메인으로 이동</a>
      </div>
    </div>

    <script>
      (function () {
        const RESULT_KEY = "maping_naver_callback_result_v1";
        const statusEl = document.getElementById("status");
        const backLink = document.getElementById("backLink");

        const pathname = window.location.pathname;
        const basePath = pathname.endsWith("/")
          ? pathname
          : pathname.slice(0, pathname.lastIndexOf("/") + 1);
        const returnUrl = `${window.location.origin}${basePath}`;
        backLink.href = returnUrl;

        const hash = window.location.hash.startsWith("#")
          ? window.location.hash.slice(1)
          : "";
        const params = new URLSearchParams(hash);
        const payload = {
          access_token: params.get("access_token") || "",
          token_type: params.get("token_type") || "",
          expires_in: params.get("expires_in") || "",
          state: params.get("state") || "",
          error: params.get("error") || "",
          error_description: params.get("error_description") || "",
          received_at: new Date().toISOString(),
        };

        try {
          const serialized = JSON.stringify(payload);
          sessionStorage.setItem(RESULT_KEY, serialized);
          localStorage.setItem(RESULT_KEY, serialized);
        } catch (error) {
          statusEl.classList.add("error");
          statusEl.textContent =
            "인증 정보를 저장하지 못했습니다. 메인으로 이동해서 다시 로그인해주세요.";
          return;
        }

        if (payload.error) {
          statusEl.classList.add("error");
          statusEl.textContent = `로그인 실패: ${
            payload.error_description || payload.error
          }`;
          return;
        }

        if (!payload.access_token) {
          statusEl.classList.add("error");
          statusEl.textContent =
            "토큰을 찾지 못했습니다. 메인으로 이동 후 다시 로그인해주세요.";
          return;
        }

        statusEl.textContent = "인증 완료. 메인 화면으로 이동합니다...";
        setTimeout(() => {
          window.location.replace(returnUrl);
        }, 900);
      })();
    </script>
  </body>
</html>
